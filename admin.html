<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin TEKA-App | Menara Pengawas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-gray-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter text-yellow-400">TEKA-ADMIN <span class="text-white font-light text-sm">v1.0</span></h1>
            <div id="connectionStatus" class="text-[10px] bg-green-600 px-2 py-1 rounded">REALTIME ACTIVE</div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-200">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">⚙️ Pengaturan Tarif</h2>
                <div id="settingsForm" class="space-y-4">
                    <div class="animate-pulse h-20 bg-gray-100 rounded"></div>
                </div>
                <button onclick="updateSettings()" class="w-full mt-6 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Simpan Perubahan</button>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 min-h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold">📦 Orderan Masuk</h2>
                    <span id="orderCount" class="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full">0 Order</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-xs text-gray-400 uppercase border-b">
                            <tr>
                                <th class="pb-3">Waktu</th>
                                <th class="pb-3">Total</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // 1. LOAD SETTINGS
        async function loadSettings() {
            const { data, error } = await supabaseClient.from('settings').select('*');
            if (error) return;
            
            const form = document.getElementById('settingsForm');
            form.innerHTML = '';
            data.forEach(item => {
                form.innerHTML += `
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">${item.key.replace(/_/g, ' ')}</label>
                        <input type="number" id="input_${item.key}" value="${item.value}" 
                               class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                `;
            });
        }

        // 2. UPDATE SETTINGS
        async function updateSettings() {
            const keys = ['ongkir_dasar', 'jarak_minimal', 'ongkir_per_km'];
            for (const key of keys) {
                const val = document.getElementById(`input_${key}`).value;
                await supabaseClient.from('settings').update({ value: val }).eq('key', key);
            }
            alert("✅ Tarif berhasil diperbarui!");
        }

        // 3. LOAD ORDERS
        async function loadOrders() {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(10);
            
            if (error) return;
            renderOrders(data);
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orderTableBody');
            document.getElementById('orderCount').innerText = `${orders.length} Order`;
            tbody.innerHTML = '';
            orders.forEach(order => {
                const date = new Date(order.created_at).toLocaleTimeString('id-ID');
                const statusColor = order.status === 'taken' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="py-4 text-sm font-medium">${date}</td>
                        <td class="py-4 text-sm font-bold text-blue-600">Rp ${Number(order.total_price).toLocaleString('id-ID')}</td>
                        <td class="py-4">
                            <span class="text-[10px] px-2 py-1 rounded-md font-bold uppercase ${statusColor}">${order.status || 'pending'}</span>
                        </td>
                        <td class="py-4 text-right">
                            <button onclick="viewMaps(${order.dest_latitude}, ${order.dest_longitude})" class="text-xs bg-gray-100 p-2 rounded hover:bg-gray-200">📍 Lokasi</button>
                        </td>
                    </tr>
                `;
            });
        }

        function viewMaps(lat, lng) {
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        }

        // 4. REALTIME LISTENER
        supabaseClient
            .channel('schema-db-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, payload => {
                console.log('Ada orderan baru!', payload);
                loadOrders(); // Refresh tabel otomatis
            })
            .subscribe();

        // Initial Load
        loadSettings();
        loadOrders();
    </script>
</body>
</html>
