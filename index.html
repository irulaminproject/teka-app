<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKA-App | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-blue-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
            <h1 class="text-xl font-bold italic">TEKA<span class="text-yellow-400">APP</span></h1>
            <p class="text-xs opacity-80">Konfirmasi Pesanan Anda</p>
        </div>

        <div class="bg-white p-4 rounded-3xl border shadow-sm flex items-center justify-between">
            <div>
                <h3 class="font-bold text-slate-800">Lanjutkan Pemesanan</h3>
                <p class="text-blue-600 font-bold">Pastikan GPS Aktif</p>
            </div>
            <button onclick="orderNow(72000, 'MASUKKAN_STORE_ID_DISINI')" 
                    class="bg-yellow-400 text-black px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-md">
                Beli Sekarang
            </button>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm hidden flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold italic">Sedang Memproses...</p>
    </div>

    <script>
        async function orderNow(price, storeId) {
            const isReady = confirm("Aktifkan GPS HP Anda sekarang untuk keperluan pengiriman, lalu klik OK.");
            if(!isReady) return;

            document.getElementById('loader').classList.remove('hidden');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
                    
                    // 1. Simpan Order ke Database
                    const { data: order, error: orderError } = await supabaseClient.from('orders').insert([{
                        total_price: price,
                        store_id: storeId,
                        dest_latitude: pos.coords.latitude,
                        dest_longitude: pos.coords.longitude,
                        status: 'pending'
                    }]).select().single();

                    if(orderError) throw orderError;

                    // 2. Ambil ID Grup Wilayah secara Dinamis
                    const { data: info } = await supabaseClient
                        .from('stores')
                        .select(`
                            store_name,
                            pangkalan (telegram_group_id)
                        `)
                        .eq('id', storeId)
                        .single();

                    const targetGroup = info?.pangkalan?.telegram_group_id;

                    // 3. Kirim Notifikasi ke Grup Telegram yang Sesuai
                    if (targetGroup) {
                        const message = `📦 *ORDER BARU (LANDING PAGE)*\n\n` +
                                        `💰 Total: Rp${price.toLocaleString('id-ID')}\n` +
                                        `🏪 Toko: ${info.store_name}\n` +
                                        `📍 Lokasi: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n\n` +
                                        `🚨 *Kurir Wilayah:* Ada pesanan baru, segera cek dashboard!`;

                        await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN || '8537812998:AAHEL4kqYY8mS4LLOuTZjbvf7vAnpusxjSM'}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: targetGroup,
                                text: message,
                                parse_mode: "Markdown"
                            })
                        });
                    }

                    alert("✅ BERHASIL! Pesanan Anda sedang diproses oleh kurir wilayah.");
                    
                } catch (e) {
                    alert("Gagal memproses pesanan: " + e.message);
                } finally {
                    document.getElementById('loader').classList.add('hidden');
                }
            }, (err) => {
                document.getElementById('loader').classList.add('hidden');
                alert("GPS Gagal: Pastikan fitur lokasi HP Anda sudah aktif.");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
