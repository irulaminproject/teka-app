<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKA-App | Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div id="debug-profile" style="background: #f0f0f0; padding: 10px; border-bottom: 2px solid #ccc; font-family: monospace; font-size: 12px;">
        <strong>🔍 DEBUG STATUS:</strong><br>
        Nama: <span id="debug-name">Memuat...</span><br>
        TG-ID: <span id="debug-id">Memuat...</span><br>
        Profile-ID: <span id="debug-uuid">Memuat...</span>
    </div>
    
    <div class="max-w-md mx-auto">
        <div class="bg-blue-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
            <h1 class="text-xl font-bold italic">TEKA<span class="text-yellow-400">APP</span></h1>
            <p class="text-xs opacity-80" id="shop-tagline">Pesan Sembako Delivery</p>
        </div>

        <div id="product-list" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Memuat produk...</p>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-black/80 hidden flex flex-col items-center justify-center text-white z-50">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold italic text-lg text-yellow-400">Sedang Memproses...</p>
        <p class="text-xs opacity-70">Harap jangan tutup halaman ini</p>
    </div>

    <script>
        // Inisialisasi Supabase
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // 1. Fungsi Mengambil Produk dari Database (Sesuai Struktur Tabel Boss)
        async function loadLandingProducts() {
            const { data: products, error } = await supabaseClient
                .from('products')
                .select('id, name, price, store_id, stores(store_name)')
                .eq('is_available', true);

            const container = document.getElementById('product-list');
            if (error || !products || products.length === 0) {
                container.innerHTML = '<p class="text-center text-red-500">Gagal memuat produk atau produk kosong.</p>';
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-3xl border shadow-sm flex items-center justify-between transition-all active:scale-95">
                    <div>
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${p.stores?.store_name || 'Toko TEKA'}</p>
                        <h3 class="font-bold text-slate-800">${p.name}</h3>
                        <p class="text-blue-600 font-bold">Rp${p.price.toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="orderNow(${p.price}, '${p.store_id}', '${p.name}')" 
                            class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold text-xs shadow-md">
                        BELI
                    </button>
                </div>
            `).join('');
        }

        // 2. Fungsi Order Utama (GPS + Database + Invoice Telegram)
        async function orderNow(price, storeId, productName) {
            const isReady = confirm(`Konfirmasi Pesanan:\n${productName}\nTotal: Rp${price.toLocaleString('id-ID')}\n\nPastikan GPS HP Anda aktif.`);
            if(!isReady) return;

            document.getElementById('loader').classList.remove('hidden');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    // Simpan data order ke Supabase
                    const { data: order, error: orderErr } = await supabaseClient.from('orders').insert([{
                        total_price: price,
                        store_id: storeId,
                        dest_latitude: pos.coords.latitude,
                        dest_longitude: pos.coords.longitude,
                        status: 'pending'
                    }]).select().single();

                    if(orderErr) throw orderErr;

                    // Ambil data Grup Telegram Wilayah secara dinamis
                    const { data: info } = await supabaseClient
                        .from('stores')
                        .select('store_name, pangkalan(telegram_group_id)')
                        .eq('id', storeId)
                        .single();

                    const targetGroup = info?.pangkalan?.telegram_group_id;

                    // Kirim Invoice Digital ke Grup Telegram
                    if (targetGroup) {
                        const invoice = `🧾 *INVOICE LANDING PAGE*\n` +
                                        `ID: #LND-${order.id.slice(0, 8)}\n` +
                                        `------------------------------------------\n` +
                                        `🛍️ *Produk:* ${productName}\n` +
                                        `💰 *Total:* Rp${price.toLocaleString('id-ID')}\n` +
                                        `🏪 *Toko:* ${info.store_name}\n` +
                                        `📍 *Lokasi:* [Klik Untuk Navigasi](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})\n` +
                                        `------------------------------------------\n` +
                                        `🚀 _Segera kirim kurir wilayah!_`;

                        await fetch(`https://api.telegram.org/bot8537812998:AAHEL4kqYY8mS4LLOuTZjbvf7vAnpusxjSM/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: targetGroup,
                                text: invoice,
                                parse_mode: "Markdown"
                            })
                        });
                    }

                    alert("✅ BERHASIL! Pesanan Anda sudah masuk. Invoice telah dikirim ke kurir wilayah.");
                } catch (e) {
                    alert("Gagal memproses pesanan: " + e.message);
                } finally {
                    document.getElementById('loader').classList.add('hidden');
                }
            }, (err) => {
                document.getElementById('loader').classList.add('hidden');
                alert("GPS Gagal: Gagal mendapatkan lokasi. Harap izinkan akses lokasi di browser Anda.");
            }, { enableHighAccuracy: true });
        }

        // Jalankan pengambilan produk saat halaman dibuka
        loadLandingProducts();
    </script>
</body>
</html>
