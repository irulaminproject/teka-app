<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKA-App | DINDA INKA SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md bg-gray-800 rounded-3xl p-6 shadow-2xl border border-gray-700 mt-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-yellow-400 italic">TEKA-App</h1>
            <p class="text-gray-400 text-xs tracking-widest uppercase">Delivery Purbolinggo</p>
        </div>

        <div class="bg-gray-700 rounded-2xl p-5 border border-gray-600 mb-6">
            <h2 class="text-xl font-bold">Beras Premium 5kg</h2>
            <p class="text-2xl font-black text-green-400 mt-2">Rp 72.000</p>
        </div>

        <div id="actionArea">
            <button onclick="getLocation()" id="gpsBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-black py-5 rounded-2xl shadow-xl transition-all flex justify-center items-center gap-3">
                📍 AKTIFKAN GPS & PESAN
            </button>
        </div>

        <div id="loaderArea" class="hidden text-center py-5">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-yellow-400 mx-auto"></div>
            <p class="text-yellow-400 mt-4 font-bold text-sm">MENGUNCI KOORDINAT...</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        
        tg.ready();
        tg.expand();

        function getLocation() {
            const gpsBtn = document.getElementById('gpsBtn');
            const loader = document.getElementById('loaderArea');

            gpsBtn.classList.add('hidden');
            loader.classList.remove('hidden');

            // Minta lokasi langsung lewat fitur WebApp Telegram
            tg.getLocation((data) => {
                if (data && data.latitude) {
                    sendOrder(data.latitude, data.longitude);
                } else {
                    // Jika fitur Telegram gagal, pakai cadangan Browser
                    navigator.geolocation.getCurrentPosition(
                        (pos) => sendOrder(pos.coords.latitude, pos.coords.longitude),
                        (err) => {
                            alert("Gagal ambil lokasi. Pastikan GPS HP Aktif & Izin Telegram diizinkan.");
                            resetUI();
                        },
                        { enableHighAccuracy: true }
                    );
                }
            });
        }

        async function sendOrder(lat, lng) {
            try {
                const { error } = await supabaseClient.from('orders').insert([{ 
                    total_price: 72000, 
                    store_id: 'c8e88263-42ae-464f-99d2-eafa72183af8', 
                    dest_latitude: lat, 
                    dest_longitude: lng 
                }]);

                if (error) throw error;

                tg.showPopup({
                    title: 'BERHASIL!',
                    message: 'Orderan terkirim. Kurir akan segera meluncur.',
                    buttons: [{type: 'close'}]
                }, () => tg.close());

            } catch (err) {
                alert("Error: " + err.message);
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('gpsBtn').classList.remove('hidden');
            document.getElementById('loaderArea').classList.add('hidden');
        }
    </script>
</body>
</html>
