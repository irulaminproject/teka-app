<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKA-App | DINDA INKA SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-3xl p-6 shadow-2xl border border-gray-700 mt-4 text-center">
        <h1 class="text-3xl font-black text-yellow-400 italic">TEKA-App</h1>
        <p class="text-gray-400 text-[10px] tracking-widest uppercase">Pesan Sembako Purbolinggo</p>
    </div>

    <div class="w-full max-w-md bg-gray-800 rounded-3xl p-6 shadow-2xl border border-gray-700 mt-4">
        <div class="bg-gray-700 rounded-2xl p-5 border border-gray-600 mb-6 text-center">
            <h2 class="text-xl font-bold">Paket Sembako Hemat</h2>
            <p class="text-3xl font-black text-green-400 mt-2">Rp 72.000</p>
        </div>

        <button onclick="handleOrder()" id="orderBtn" 
                class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-black py-5 rounded-2xl shadow-xl flex justify-center items-center gap-3 transition-all active:scale-95">
            <span>🚀 PESAN VIA GPS</span>
        </button>

        <div id="loaderArea" class="hidden text-center py-5">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-yellow-400 mx-auto"></div>
            <p class="text-yellow-400 mt-4 font-bold text-sm animate-pulse">MENGHUBUNGI SATELIT GPS...</p>
            <p class="text-gray-400 text-[10px] mt-2 italic">Jika muncul pesan sistem, klik "OK" atau "Turn On"</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        
        tg.ready();
        tg.expand();

        async function handleOrder() {
            const btn = document.getElementById('orderBtn');
            const loader = document.getElementById('loaderArea');

            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            if (!navigator.geolocation) {
                tg.showAlert("Browser Anda tidak mendukung GPS.");
                resetUI();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    await submitData(pos.coords.latitude, pos.coords.longitude);
                },
                (err) => {
                    resetUI();
                    if (err.code === 2 || err.code === 3) {
                        tg.showPopup({
                            title: 'GPS TIDAK AKTIF',
                            message: 'Mohon AKTIFKAN LOKASI (GPS) di HP Anda lalu coba lagi.',
                            buttons: [{type: 'ok'}]
                        });
                    } else {
                        tg.showAlert("GPS Error: " + err.message);
                    }
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        async function submitData(lat, lng) {
            try {
                // --- BAGIAN KRUSIAL: Ambil Data User Telegram ---
                const user = tg.initDataUnsafe.user;
                
                if (!user || !user.id) {
                    tg.showAlert("Gagal mengambil ID Telegram. Pastikan Anda membuka via Telegram.");
                    resetUI();
                    return;
                }

                const { error } = await supabaseClient.from('orders').insert([{ 
                    total_price: 72000, 
                    store_id: 'c8e88263-42ae-464f-99d2-eafa72183af8', 
                    dest_latitude: lat, 
                    dest_longitude: lng,
                    customer_tg_id: user.id,           // Simpan ID Telegram Pembeli
                    customer_name: user.first_name     // Simpan Nama Pembeli
                }]);

                if (error) throw error;

                tg.showPopup({
                    title: 'BERHASIL!',
                    message: 'Pesanan terkirim! Jendela ini akan tertutup, silakan cek chat Bot untuk bicara dengan kurir.',
                    buttons: [{type: 'close'}]
                }, () => tg.close());

            } catch (err) {
                tg.showAlert("Gagal simpan: " + err.message);
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('orderBtn').classList.remove('hidden');
            document.getElementById('loaderArea').classList.add('hidden');
        }
    </script>
</body>
</html>
