<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEKA-App | Smart Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FACC15; /* Kuning TEKA */
            --primary-dark: #ccac00;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Header Styles */
        header {
            background: var(--card);
            padding: 20px 16px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 24px;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .brand span {
            color: var(--primary-dark);
        }

        #user-info {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
        }

        /* Category Filter Styles */
        .category-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 16px;
            scrollbar-width: none; /* Firefox */
        }
        .category-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .cat-pill {
            background: var(--card);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .cat-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(250, 204, 21, 0.3);
        }

        /* Main Content */
        .container {
            padding: 0 16px 100px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: transform 0.1s;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-img {
            width: 85px;
            height: 85px;
            background: #f1f5f9;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .product-info {
            flex-grow: 1;
        }

        .product-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-dark);
        }

        .product-price {
            font-weight: 800;
            color: #0369a1;
            font-size: 15px;
        }

        .product-meta {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #eff1f3 25%, #e2e8f0 50%, #eff1f3 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="brand">TEKA<span>App</span></div>
            <div id="user-info">Halo, Boss! 👋</div>
        </div>
    </header>

    <div class="category-container">
        <div class="cat-pill active">Semua</div>
        <div class="cat-pill">Makanan</div>
        <div class="cat-pill">Mart</div>
        <div class="cat-pill">Elektronik</div>
        <div class="cat-pill">Lainnya</div>
    </div>

    <div class="container">
        <div class="section-title">
            <span>🔥</span> Produk Terlaris
        </div>
        
        <div id="product-list" class="product-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Inisialisasi awal agar Telegram TWA smooth
        const webapp = window.Telegram.WebApp;
        webapp.ready();
        webapp.expand();
        webapp.setHeaderColor('bg_color');
    </script>
</body>
</html>
