<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKA-App | Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-blue-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
            <h1 class="text-xl font-bold italic">TEKA<span class="text-yellow-400">APP</span></h1>
            <p class="text-xs opacity-80" id="shop-tagline">Pesan Sembako Delivery</p>
        </div>

        <div id="product-list" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Memuat produk...</p>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-black/80 hidden flex flex-col items-center justify-center text-white z-50">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold italic">Sedang Memproses...</p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        // 1. Fungsi Mengambil Produk Langsung dari Database
        async function loadLandingProducts() {
            const { data: products, error } = await supabaseClient
                .from('products')
                .select('id, name, price, store_id, stores(store_name)')
                .eq('is_available', true)
                .limit(5); // Ambil beberapa produk untuk landing page

            const container = document.getElementById('product-list');
            if (error || !products) {
                container.innerHTML = '<p class="text-center text-red-500">Gagal memuat produk.</p>';
                return;
            }

            container.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-3xl border shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold text-blue-500 uppercase">${p.stores?.store_name || 'Toko TEKA'}</p>
                        <h3 class="font-bold text-slate-800">${p.name}</h3>
                        <p class="text-blue-600 font-bold">Rp${p.price.toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="orderNow(${p.price}, '${p.store_id}', '${p.name}')" 
                            class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold text-xs shadow-md active:scale-95 transition-all">
                        BELI
                    </button>
                </div>
            `).join('');
        }

        // 2. Fungsi Order dengan Notifikasi Otomatis
        async function orderNow(price, storeId, productName) {
            const isReady = confirm("Aktifkan GPS HP Anda sekarang, lalu klik OK.");
            if(!isReady) return;

            document.getElementById('loader').classList.remove('hidden');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    // Simpan ke Database
                    const { data: order, error: orderErr } = await supabaseClient.from('orders').insert([{
                        total_price: price,
                        store_id: storeId,
                        dest_latitude: pos.coords.latitude,
                        dest_longitude: pos.coords.longitude,
                        status: 'pending'
                    }]).select().single();

                    if(orderErr) throw orderErr;

                    // Ambil ID Grup Telegram Wilayah secara Otomatis
                    const { data: info } = await supabaseClient
                        .from('stores')
                        .select('pangkalan(telegram_group_id)')
                        .eq('id', storeId)
                        .single();

                    const targetGroup = info?.pangkalan?.telegram_group_id;

                    if (targetGroup) {
                        const message = `📦 *ORDER BARU (LANDING PAGE)*\n\n` +
                                        `🛍️ Produk: ${productName}\n` +
                                        `💰 Total: Rp${price.toLocaleString('id-ID')}\n` +
                                        `📍 Lokasi: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;

                        await fetch(`https://api.telegram.org/bot8537812998:AAHEL4kqYY8mS4LLOuTZjbvf7vAnpusxjSM/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                chat_id: targetGroup,
                                text: message,
                                parse_mode: "Markdown"
                            })
                        });
                    }

                    alert("✅ BERHASIL! Pesanan diteruskan ke kurir wilayah.");
                } catch (e) {
                    alert("Gagal: " + e.message);
                } finally {
                    document.getElementById('loader').classList.add('hidden');
                }
            }, (err) => {
                document.getElementById('loader').classList.add('hidden');
                alert("GPS Gagal: Pastikan lokasi aktif.");
            }, { enableHighAccuracy: true });
        }

        loadLandingProducts();
    </script>
</body>
</html>
